{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">{{ report.title }}</h1>

<div class="row">
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Report Details</h5>
                <p><strong>Date:</strong> {{ report.date }}</p>
                <p><strong>Affected Families:</strong> {{ report.total_affected_families }}</p>
                <p><strong>Affected Persons:</strong> {{ report.total_affected_persons }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Impact Visualization</h5>
                <canvas id="impactChart"></canvas>
            </div>
        </div>
    </div>
</div>

<a href="{% url 'report_list' %}" class="btn btn-secondary">Back to List</a>
<a href="{% url 'export_report_pdf' report.id %}" class="btn btn-primary">Export PDF</a>

<script>
    var ctx = document.getElementById('impactChart').getContext('2d');
    var chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Affected Families', 'Affected Persons'],
            datasets: [{
                data: [{{ report.total_affected_families }}, {{ report.total_affected_persons }}],
                backgroundColor: ['#28a745', '#17a2b8']
            }]
        },
        options: {
            responsive: true,
            title: {
                display: true,
                text: 'Impact Distribution'
            }
        }
    });
</script>
{% endblock %}
