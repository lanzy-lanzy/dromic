{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid mt-5">
    <h1 class="mb-4 text-center">Disaster Information Dashboard</h1>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card bg-primary text-white mb-4 shadow-sm rounded-3 h-100">
                <div class="card-body d-flex flex-column justify-content-center align-items-center">
                    <h5 class="card-title">Total Disasters</h5>
                    <h2 class="card-text display-4 fw-bold" id="totalDisasters">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-success text-white mb-4 shadow-sm rounded-3 h-100">
                <div class="card-body d-flex flex-column justify-content-center align-items-center">
                    <h5 class="card-title">Most Recent Disaster</h5>
                    <p class="card-text fs-5" id="recentDisaster">None</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card mb-4 shadow-sm rounded-3 h-100">
                <div class="card-body">
                    <h5 class="card-title text-center mb-3">Disasters Over Time</h5>
                    <canvas id="disasterChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    
    <button class="btn btn-primary mb-3 mt-4 " data-bs-toggle="modal" data-bs-target="#addDisasterModal">
        <i class="fas fa-plus-circle me-2 mt-"></i>Add New Disaster
    </button>
    
    <div class="row g-4" id="disasterList">
        <!-- Disaster cards will be dynamically added here -->
    </div>
</div>

<!-- Add Disaster Modal -->
<div class="modal fade" id="addDisasterModal" tabindex="-1" aria-labelledby="addDisasterModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="addDisasterModalLabel">Add New Disaster</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addDisasterForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="disasterName" class="form-label">Disaster Name</label>
                        <input type="text" class="form-control" id="disasterName" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="disasterDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="disasterDescription" name="description" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="disasterDate" class="form-label">Date Occurred</label>
                        <input type="text" class="form-control" id="disasterDate" name="date_occurred" required>
                     </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="saveDisaster">
                    <i class="fas fa-save me-2"></i>Save Disaster
                </button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{% static 'js/disaster_info.js' %}"></script>

{% endblock %}
