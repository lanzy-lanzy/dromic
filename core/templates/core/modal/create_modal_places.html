
<!-- Add New Disaster Modal -->
<div class="modal fade" id="addNewDisasterModal" tabindex="-1" aria-labelledby="addNewDisasterModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addNewDisasterModalLabel">Add New Disaster</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addNewDisasterForm">
                    <div class="mb-3">
                        <label for="newDisasterName" class="form-label">Disaster Name</label>
                        <input type="text" class="form-control" id="newDisasterName" required>
                    </div>
                    <div class="mb-3">
                        <label for="newDisasterDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="newDisasterDescription" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="newDisasterDate" class="form-label">Date Occurred</label>
                        <input type="date" class="form-control" id="newDisasterDate" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="saveNewDisaster">Save</button>
            </div>
        </div>
    </div>
</div>
