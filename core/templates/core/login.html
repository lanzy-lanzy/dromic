<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dromic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }
        .login-title {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 25px;
        }
        .input-group-text {
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px 0 0 10px;
        }
        .form-control {
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 0 10px 10px 0;
            color: #ffffff;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        .btn-login {
            background-color: #4a90e2;
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-weight: 700;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background-color: #3a7bc8;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .register-link {
            color: #ffffff;
            font-weight: 700;
            text-decoration: none;
        }
        .register-link:hover {
            text-decoration: underline;
        }
        .floating-icon {
            position: absolute;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.5);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="login-title">Welcome Back</h2>
        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user" style="color: #4a90e2;"></i></span>
                <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock" style="color: #4a90e2;"></i></span>
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-login">Log In</button>
            </div>
        </form>
        <p class="text-center mt-4">
            New user? <a href="{% url 'register' %}" class="register-link">Create an account</a>
        </p>
    </div>

    <!-- Floating Icons -->
    <i class="fas fa-code floating-icon" style="top: 10%; left: 10%;"></i>
    <i class="fas fa-database floating-icon" style="top: 20%; right: 15%; animation-delay: 1s;"></i>
    <i class="fas fa-cogs floating-icon" style="bottom: 15%; left: 20%; animation-delay: 2s;"></i>
    <i class="fas fa-cloud floating-icon" style="bottom: 25%; right: 10%; animation-delay: 3s;"></i>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
