<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DROMIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'poppins': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'dromic': {
                            'cream': '#FAFAF9',
                            'beige': '#FFFFFF',
                            'rose': '#EA580C',
                            'slate': '#334155',
                            'navy': '#1C1917',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.6s ease-out',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(30px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #334155 0%, #475569 50%, #EA580C 100%);
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            outline: none;
        }
        .input-glass::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .btn-glow {
            position: relative;
            overflow: hidden;
        }
        .btn-glow::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        .btn-glow:hover::before {
            left: 100%;
        }
        .floating-icon {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
    </style>
</head>
<body class="bg-cover bg-center bg-no-repeat min-h-screen flex items-center justify-center relative overflow-hidden" style="background-image: url('{% static 'img/dromic_hero_bg.png' %}');">
    <!-- Dark Overlay -->
    <div class="absolute inset-0 bg-dromic-navy/80 z-0"></div>

    <!-- Animated Background Orbs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-orange-400/30 rounded-full blur-3xl animate-pulse-slow"></div>
        <div class="absolute top-1/3 right-1/4 w-72 h-72 bg-slate-400/30 rounded-full blur-3xl animate-pulse-slow" style="animation-delay: 1s;"></div>
        <div class="absolute bottom-1/4 left-1/3 w-96 h-96 bg-orange-300/30 rounded-full blur-3xl animate-pulse-slow" style="animation-delay: 2s;"></div>
    </div>

    <!-- Floating Icons -->
    <i class="fas fa-shield-alt floating-icon text-4xl z-0" style="top: 10%; left: 10%;"></i>
    <i class="fas fa-database floating-icon text-3xl z-0" style="top: 20%; right: 15%; animation-delay: 1s;"></i>
    <i class="fas fa-bolt floating-icon text-2xl z-0" style="bottom: 15%; left: 20%; animation-delay: 2s;"></i>
    <i class="fas fa-cloud floating-icon text-3xl z-0" style="bottom: 25%; right: 10%; animation-delay: 3s;"></i>
    <i class="fas fa-map-marker-alt floating-icon text-2xl z-0" style="top: 60%; left: 5%; animation-delay: 1.5s;"></i>
    <i class="fas fa-users floating-icon text-2xl z-0" style="top: 40%; right: 5%; animation-delay: 2.5s;"></i>

    <!-- Login Card -->
    <div class="relative z-10 w-full max-w-md px-4 animate-slide-up">
        <div class="glass-card rounded-3xl shadow-2xl p-8 md:p-10">
            <!-- Logo & Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-white/10 rounded-2xl mb-4 shadow-lg p-2 overflow-hidden border border-white/20">
                    <img src="{% static 'img/dromic_logo.png' %}" alt="DROMIC Logo" class="w-full h-full object-contain drop-shadow-md">
                </div>
                <h1 class="text-3xl font-bold text-white mb-2">DROMIC</h1>
                <p class="text-white/60 text-sm">Disaster Response Operations Center</p>
            </div>

            <!-- Welcome Text -->
            <div class="text-center mb-6">
                <h2 class="text-2xl font-semibold text-white">Welcome Back</h2>
                <p class="text-white/60 text-sm mt-1">Sign in to continue to your dashboard</p>
            </div>

            <!-- Login Form -->
            <form method="post" class="space-y-5">
                {% csrf_token %}
                
                <!-- Username Field -->
                <div class="relative">
                    <label class="block text-white/80 text-sm font-medium mb-2">Username</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-white/60">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" 
                               id="username" 
                               name="username" 
                               placeholder="Enter your username"
                               required
                               class="input-glass w-full pl-12 pr-4 py-3.5 rounded-xl text-white placeholder-white/60">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="relative">
                    <label class="block text-white/80 text-sm font-medium mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-white/60">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" 
                               id="password" 
                               name="password" 
                               placeholder="Enter your password"
                               required
                               class="input-glass w-full pl-12 pr-4 py-3.5 rounded-xl text-white placeholder-white/60">
                        <button type="button" 
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-white/60 hover:text-white transition-colors"
                                onclick="togglePassword()">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-white/70 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded border-white/30 bg-white/10 text-orange-500 focus:ring-orange-500 mr-2">
                        Remember me
                    </label>
                    <a href="#" class="text-white/70 hover:text-white transition-colors">
                        Forgot password?
                    </a>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                        class="btn-glow w-full bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white font-semibold py-3.5 rounded-xl transition-all duration-300 shadow-lg hover:shadow-xl hover:-translate-y-0.5 flex items-center justify-center">
                    <i class="fas fa-sign-in-alt mr-2"></i>
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/20"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-transparent text-white/50">or</span>
                </div>
            </div>

            <!-- Register Link -->
            <div class="text-center">
                    <p class="text-white/70">
                        Don't have an account?
                        <a href="{% url 'register' %}" class="text-orange-400 font-semibold hover:text-orange-300 transition-colors inline-flex items-center ml-1">
                            Create Account
                            <i class="fas fa-arrow-right ml-1 text-sm"></i>
                        </a>
                    </p>
            </div>

            <!-- Back to Home -->
            <div class="mt-6 text-center">
                <a href="{% url 'index' %}" class="inline-flex items-center text-white/50 hover:text-white transition-colors text-sm">
                    <i class="fas fa-arrow-left mr-2"></i>
                    Back to Home
                </a>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6">
            <p class="text-white/40 text-xs">
                &copy; 2024 DROMIC. All rights reserved.
            </p>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
