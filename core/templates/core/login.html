<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DROMIC Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
   
    <style>
        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            overflow: hidden;
        }
        @keyframes gradient {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        .login-container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        .icon-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .icon-container i {
            position: absolute;
            font-size: 24px;
            animation: float 6s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .icon-container i:nth-child(1) { color: #FFD700; }
        .icon-container i:nth-child(2) { color: #00CED1; }
        .icon-container i:nth-child(3) { color: #FF6347; }
        .icon-container i:nth-child(4) { color: #FF69B4; }
        .icon-container i:nth-child(5) { color: #32CD32; }
        .icon-container i:nth-child(6) { color: #8A2BE2; }
        .icon-container i:nth-child(7) { color: #20B2AA; }
        .icon-container i:nth-child(8) { color: #4169E1; }
        .btn-link {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="icon-container">
        <i class="fas fa-shield-alt" style="top: 10%; left: 10%;"></i>
        <i class="fas fa-users" style="top: 20%; right: 15%;"></i>
        <i class="fas fa-chart-line" style="bottom: 15%; left: 20%;"></i>
        <i class="fas fa-heartbeat" style="top: 40%; right: 25%;"></i>
        <i class="fas fa-hands-helping" style="bottom: 30%; right: 10%;"></i>
        <i class="fas fa-house-damage" style="top: 60%; left: 5%;"></i>
        <i class="fas fa-wind" style="bottom: 10%; right: 30%;"></i>
        <i class="fas fa-water" style="top: 5%; right: 40%;"></i>
    </div>
    <div class="container d-flex align-items-center justify-content-center" style="height: 100vh;">
        <div class="login-container animate__animated animate__fadeIn">
            <h2 class="text-center mb-4">DROMIC Login</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
                <hr class="my-4">
                <div class="mt-3 text-center">
                    <p class="mb-0">Don't have an account?</p>
                    <a href="{% url 'register' %}" class="btn btn-link btn-sm animate__animated animate__pulse animate__infinite">Sign up here</a>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
